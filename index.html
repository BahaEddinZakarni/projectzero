<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart City - Parking Office V5.4</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        :root { 
            --bg: #f1f5f9; 
            --card: #ffffff; 
            --text: #0f172a; 
            --accent: #0284c7; 
            --red: #ef4444; 
            --green: #16a34a; 
            --orange: #f97316;
            --border: #e2e8f0;
        }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        h1 { color: var(--text); font-weight: 800; border-bottom: 3px solid var(--accent); display: inline-block; margin-bottom: 30px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { 
            background: var(--card); padding: 20px; border-radius: 12px; text-align: center; 
            border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); 
        }
        .stat-card h2 { color: #64748b; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.05em; margin: 0; }
        .stat-card div { font-size: 2.5rem; font-weight: 800; margin-top: 10px; }

        .btn-reset-rev { 
            margin-top: 10px; padding: 4px 12px; background: #f8fafc; border: 1px solid var(--border); 
            border-radius: 6px; cursor: pointer; font-size: 0.7rem; color: #64748b; font-weight: bold; transition: all 0.2s;
        }
        .btn-reset-rev:hover { background: var(--red); color: white; border-color: var(--red); }

        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
        th { background: #f8fafc; padding: 15px; text-align: left; color: #64748b; font-size: 0.8rem; border-bottom: 2px solid var(--border); }
        td { padding: 12px 15px; border-bottom: 1px solid var(--border); font-family: 'Courier New', monospace; font-weight: 600; }
        
        .action-select { 
            background: #f8fafc; color: var(--text); border: 1px solid var(--border); 
            border-radius: 4px; width: 34px; height: 28px; cursor: pointer; font-size: 14px;       
            text-align: center; padding-left: 4px; margin-right: 15px; line-height: 28px;
            appearance: none; -webkit-appearance: none;
        }
        .action-select:hover { border-color: var(--accent); background: white; }

        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; margin-right: 8px; color: white; }
        .bg-red { background: var(--red); } 
        .bg-green { background: var(--green); } 
        .bg-yellow { background: #eab308; color: black; }
        .bg-gray { background: #94a3b8; }
        .flex-cell { display: flex; align-items: center; justify-content: flex-start; }

        .ping-alert { 
            animation: flash 0.8s infinite; color: white !important; font-weight: bold; border-radius: 4px; text-align: center; 
        }
        @keyframes flash { 0%, 100% { background: var(--red); } 50% { background: var(--orange); } }

        #modal-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center; 
        }
        .modal-box { 
            background: var(--card); padding: 30px; border-radius: 12px; box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
            border: 1px solid var(--border); text-align: center; max-width: 400px;
        }
        .time-box { 
            width: 50px; padding: 8px; background: var(--bg); border: 1px solid var(--border); 
            color: var(--text); font-size: 1.2rem; text-align: center; border-radius: 4px; font-weight: bold;
        }
        .loc-input { background: #f8fafc; color: var(--accent); border: 1px solid var(--border); padding: 6px; border-radius: 4px; width: 90%; font-weight: bold; }
    </style>
</head>
<body>

    <div id="modal-overlay">
        <div class="modal-box">
            <h3 style="margin-top:0">Set Custom Time</h3>
            <div style="margin: 20px 0;">
                <input type="number" id="h-in" class="time-box" placeholder="00">h :
                <input type="number" id="m-in" class="time-box" placeholder="00">m :
                <input type="number" id="s-in" class="time-box" placeholder="00">s
            </div>
            <button onclick="submitCustomTime()" style="background:var(--accent); color:white; padding:12px 24px; border:none; border-radius:6px; cursor:pointer; font-weight:bold;">SEND TO METER</button>
            <button onclick="closeModal()" style="background:#64748b; color:white; padding:12px 24px; border:none; border-radius:6px; cursor:pointer; margin-left:10px;">CANCEL</button>
        </div>
    </div>

    <h1>🏙️ Parking Command Center V5.4</h1>

    <div class="grid">
        <div class="stat-card"><h2>Active Nodes</h2><div id="total-meters">0</div></div>
        <div class="stat-card"><h2>Violations</h2><div id="total-violations" style="color:var(--red)">0</div></div>
        <div class="stat-card">
            <h2>Total Paid Revenue</h2>
            <div id="total-revenue" style="color:var(--green)">$0.00</div>
            <button class="btn-reset-rev" onclick="resetRevenue()">RESET DATA</button>
        </div>
    </div>

    <table id="meter-table">
        <thead>
            <tr><th>MAC ID</th><th>Location Assignment</th><th>Slot A</th><th>Slot B</th><th>Heartbeat</th></tr>
        </thead>
        <tbody></tbody>
    </table>

    <script>
        // FIREBASE INITIALIZATION
        const firebaseConfig = {
            apiKey: "AIzaSyC8bGSil04ps-fJpcOIBemiQ5cMLp9FVgQ",
            authDomain: "parking-system-6ae17.firebaseapp.com",
            databaseURL: "https://parking-system-6ae17-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "parking-system-6ae17",
            storageBucket: "parking-system-6ae17.firebasestorage.app",
            messagingSenderId: "219719794443",
            appId: "1:219719794443:web:07ef943ea46be7e19d6c0e"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- NEW: SERVER TIME SYNC OFFSET ---
        let serverOffset = 0;
        db.ref('.info/serverTimeOffset').on('value', (snap) => {
            serverOffset = snap.val() || 0;
        });

        let meters = {};
        let currentTarget = { id: '', slot: '' };
        let offlineState = {}; 

        // SOUND LOGIC (INTACT)
        function playAlertSound() {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.5); 
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.5);
        }

        // REVENUE LOGIC (CLOUD)
        db.ref('global_stats/totalRevenue').on('value', (snap) => {
            document.getElementById('total-revenue').innerText = "$" + (snap.val() || 0).toFixed(2);
        });

        function resetRevenue() {
            if (confirm("Reset cloud revenue counter to $0.00?")) {
                db.ref('global_stats/totalRevenue').set(0);
            }
        }

        // METER DATA SYNC
        db.ref('meters').on('value', (snapshot) => {
            meters = snapshot.val() || {};
            updateUI();
        });

        function updateUI() {
            const tbody = document.querySelector('#meter-table tbody');
            
            // Use the offset to calculate true server time
            const now = Date.now() + serverOffset; 
            
            let violations = 0;
            let activeNodes = 0;
            const totalNodes = Object.keys(meters).length;

            for (const id in meters) {
                const m = meters[id];
                let row = document.getElementById('row-' + id);
                
                if (!row) {
                    row = tbody.insertRow(); row.id = 'row-' + id;
                    row.innerHTML = `
                        <td><code>${id}</code></td>
                        <td><input type="text" class="loc-input" id="in-${id}" onchange="updateNickname('${id}', this.value)"></td>
                        <td>
                            <div class="flex-cell">
                                <select class="action-select" onchange="handleAction('${id}','A',this.value);this.value=''">
                                    <option value="">⚙️</option>
                                    <option value="reset">Reset</option>
                                    <option value="custom">Custom</option>
                                    <option value="forceLoc">LOC</option>
                                </select>
                                <span id="statA-${id}"></span>
                            </div>
                        </td>
                        <td>
                            <div class="flex-cell">
                                <select class="action-select" onchange="handleAction('${id}','B',this.value);this.value=''">
                                    <option value="">⚙️</option>
                                    <option value="reset">Reset</option>
                                    <option value="custom">Custom</option>
                                    <option value="forceLoc">LOC</option>
                                </select>
                                <span id="statB-${id}"></span>
                            </div>
                        </td>
                        <td id="p-${id}"></td>
                    `;
                }

                document.getElementById('in-' + id).value = m.nickname || "";
                
                // Count slots independently for violations
                if (m.locA) violations++;
                if (m.locB) violations++;
                
                // 35-second threshold calculated against synced time
                const isDead = (now - m.lastSeen) > 35000;
                
                // Track active nodes
                if (!isDead) activeNodes++;

                const pCell = document.getElementById(`p-${id}`);
                
                if (isDead && !offlineState[id]) { playAlertSound(); offlineState[id] = true; } 
                else if (!isDead) { offlineState[id] = false; }

                pCell.innerText = new Date(m.lastSeen).toLocaleTimeString() + (isDead ? " (OFFLINE)" : "");
                pCell.className = isDead ? 'ping-alert' : '';

                updateStatusCell(`statA-${id}`, m.remA, m.locA);
                updateStatusCell(`statB-${id}`, m.remB, m.locB);
            }

            document.getElementById('total-meters').innerText = `${activeNodes} / ${totalNodes}`;
            document.getElementById('total-violations').innerText = violations;
        }

        // COMMAND HANDLING
        function handleAction(id, slot, action) {
            if (action === "custom") {
                currentTarget = { id, slot };
                document.getElementById('modal-overlay').style.display = 'flex';
            } else if (action) {
                let cmd = action === "reset" ? "RESET" : "LOCK";
                sendCmd(id, slot, cmd);
            }
        }

        function submitCustomTime() {
            const h = parseInt(document.getElementById('h-in').value) || 0;
            const m = parseInt(document.getElementById('m-in').value) || 0;
            const s = parseInt(document.getElementById('s-in').value) || 0;
            const totalSecs = (h * 3600) + (m * 60) + s;
            sendCmd(currentTarget.id, currentTarget.slot, "ADD_TIME", totalSecs);
            closeModal();
        }

        function sendCmd(id, slot, action, value = 0) {
            db.ref('commands/' + id).set({
                action: action,
                slot: slot,
                value: value,
                // Client-side synced timestamp for commands
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });
        }

        function updateNickname(id, val) {
            db.ref('meters/' + id).update({ nickname: val });
        }

        function formatTime(s) {
            const absS = Math.abs(s);
            const h = Math.floor(absS / 3600).toString().padStart(2, '0');
            const m = Math.floor((absS % 3600) / 60).toString().padStart(2, '0');
            const sec = (absS % 60).toString().padStart(2, '0');
            return (s < 0 ? "-" : "") + h + ":" + m + ":" + sec;
        }

        function updateStatusCell(elId, rem, loc) {
            const el = document.getElementById(elId); if(!el) return;
            let b = "bg-gray", l = "IDLE";
            if (loc) { b = "bg-red"; l = "LOC"; }
            else if (rem < 0) { b = "bg-yellow"; l = "GRACE"; }
            else if (rem > 0) { b = "bg-green"; l = "PAID"; }
            el.innerHTML = `<span class="status-badge ${b}">${l}</span><b>${loc ? 'VIOLATION' : formatTime(rem)}</b>`;
        }

        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
        setInterval(updateUI, 1000);
    </script>
</body>
</html>
