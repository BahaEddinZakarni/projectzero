<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart City - Parking Office V4.1</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #38bdf8; --red: #ef4444; --green: #22c55e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 12px; text-align: center; border: 1px solid #334155; }
        .stat-card div { font-size: 2.5rem; font-weight: bold; margin-top: 10px; }
        
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 12px; overflow: hidden; }
        th { background: #334155; padding: 15px; text-align: left; color: #94a3b8; }
        td { padding: 12px 15px; border-bottom: 1px solid #334155; font-family: 'Courier New', monospace; }
        
        /* REFINED GEAR BOX V4.1 */
        .action-select { 
            background: #334155; 
            color: white; 
            border: 1px solid #475569; 
            border-radius: 4px; 
            width: 34px;           /* Narrower box */
            height: 28px;          /* Shorter box */
            cursor: pointer; 
            font-size: 14px;       /* Smaller icon to prevent clipping */
            text-align: center;
            padding-left: 4px;     /* Internal padding to center emoji */
            margin-right: 15px;    /* Gap to prevent touching status box */
            line-height: 28px;
            appearance: none;      /* Removes default browser arrow in some browsers */
            -webkit-appearance: none;
        }

        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; margin-right: 8px; }
        .bg-red { background: var(--red); } .bg-green { background: var(--green); } .bg-yellow { background: #eab308; color: black; }
        .bg-gray { background: #64748b; }
        .flex-cell { display: flex; align-items: center; justify-content: flex-start; }

        /* MODAL */
        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .modal-box { background: var(--card); padding: 30px; border-radius: 12px; border: 2px solid var(--accent); text-align: center; }
        .time-box { width: 50px; padding: 8px; background: var(--bg); border: 1px solid #475569; color: var(--accent); font-size: 1.2rem; text-align: center; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="modal-overlay">
        <div class="modal-box">
            <h3>Set Custom Time</h3>
            <div style="margin: 20px 0; color: white;">
                <input type="number" id="h-in" class="time-box" placeholder="00">h :
                <input type="number" id="m-in" class="time-box" placeholder="00">m :
                <input type="number" id="s-in" class="time-box" placeholder="00">s
            </div>
            <button onclick="submitCustomTime()" style="background:var(--green); color:white; padding:10px 20px; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">SEND TO METER</button>
            <button onclick="closeModal()" style="background:#475569; color:white; padding:10px 20px; border:none; border-radius:5px; cursor:pointer; margin-left:10px;">CANCEL</button>
        </div>
    </div>

    <h1>🏙️ Parking Command Center V4.1</h1>

    <div class="grid">
        <div class="stat-card"><h2>Active Nodes</h2><div id="total-meters">0</div></div>
        <div class="stat-card"><h2>Violations</h2><div id="total-violations" style="color:var(--red)">0</div></div>
        <div class="stat-card"><h2>Total Revenue</h2><div id="total-revenue" style="color:var(--green)">$0.00</div></div>
    </div>

    <table id="meter-table">
        <thead>
            <tr><th>MAC ID</th><th>Location Assignment</th><th>Slot A</th><th>Slot B</th><th>Heartbeat</th></tr>
        </thead>
        <tbody></tbody>
    </table>

    <script>
        const mqtt_url = "wss://c335c915f7a540bcb9d83b6f4b0444f3.s1.eu.hivemq.cloud:8884/mqtt";
        const options = { username: 'esp32_worker', password: 'ParkMaster2026' };
        let meters = {};
        let totalRevenue = parseFloat(localStorage.getItem('savedRev')) || 0;
        let currentTarget = { id: '', slot: '' };
        let ignoreNextA = {}; 
        let ignoreNextB = {};
        let localRegistry = JSON.parse(localStorage.getItem('meterLocations')) || {};

        const client = mqtt.connect(mqtt_url, options);
        client.on('connect', () => client.subscribe('city/street1/+/status'));

        client.on('message', (topic, message) => {
            const data = JSON.parse(message.toString());
            const id = data.id;

            if (meters[id]) {
                if (data.remA > meters[id].remA + 10) {
                    if (ignoreNextA[id]) ignoreNextA[id] = false;
                    else totalRevenue += (data.remA - meters[id].remA) / 1800;
                }
                if (data.remB > meters[id].remB + 10) {
                    if (ignoreNextB[id]) ignoreNextB[id] = false;
                    else totalRevenue += (data.remB - meters[id].remB) / 1800;
                }
            }
            meters[id] = { ...data, lastSeen: Date.now() };
            localStorage.setItem('savedRev', totalRevenue);
            updateUI();
        });

        function updateUI() {
            const tbody = document.querySelector('#meter-table tbody');
            let violations = 0;
            for (const id in meters) {
                const m = meters[id];
                let row = document.getElementById('row-' + id);
                if (!row) {
                    row = tbody.insertRow(); row.id = 'row-' + id;
                    row.innerHTML = `
                        <td><code>${id}</code></td>
                        <td><input type="text" class="loc-input" id="in-${id}" style="background:transparent; color:var(--accent); border:1px solid #334155; padding:4px; border-radius:4px;" onchange="localRegistry['${id}']=this.value; localStorage.setItem('meterLocations', JSON.stringify(localRegistry))"></td>
                        <td>
                            <div class="flex-cell">
                                <select class="action-select" onchange="handleAction('${id}','A',this.value);this.value=''">
                                    <option value="">⚙️</option>
                                    <option value="reset">Reset</option>
                                    <option value="custom">Custom</option>
                                    <option value="forceLoc">LOC</option>
                                </select>
                                <span id="statA-${id}"></span>
                            </div>
                        </td>
                        <td>
                            <div class="flex-cell">
                                <select class="action-select" onchange="handleAction('${id}','B',this.value);this.value=''">
                                    <option value="">⚙️</option>
                                    <option value="reset">Reset</option>
                                    <option value="custom">Custom</option>
                                    <option value="forceLoc">LOC</option>
                                </select>
                                <span id="statB-${id}"></span>
                            </div>
                        </td>
                        <td id="p-${id}"></td>
                    `;
                    document.getElementById('in-' + id).value = localRegistry[id] || "";
                }
                if (m.locA || m.locB) violations++;
                updateStatusCell(`statA-${id}`, m.remA, m.locA);
                updateStatusCell(`statB-${id}`, m.remB, m.locB);
                document.getElementById(`p-${id}`).innerText = new Date(m.lastSeen).toLocaleTimeString();
            }
            document.getElementById('total-meters').innerText = Object.keys(meters).length;
            document.getElementById('total-violations').innerText = violations;
            document.getElementById('total-revenue').innerText = "$" + totalRevenue.toFixed(2);
        }

        function handleAction(id, slot, action) {
            if (action === "custom") {
                currentTarget = { id, slot };
                document.getElementById('modal-overlay').style.display = 'flex';
            } else if (action === "reset") {
                if(slot === 'A') ignoreNextA[id] = true; else ignoreNextB[id] = true;
                client.publish(`city/street1/${id}/cmd`, action + slot);
            } else if (action) {
                client.publish(`city/street1/${id}/cmd`, action + slot);
            }
        }

        function submitCustomTime() {
            const h = parseInt(document.getElementById('h-in').value) || 0;
            const m = parseInt(document.getElementById('m-in').value) || 0;
            const s = parseInt(document.getElementById('s-in').value) || 0;
            const secs = (h * 3600) + (m * 60) + s;
            if (currentTarget.slot === 'A') ignoreNextA[currentTarget.id] = true;
            else ignoreNextB[currentTarget.id] = true;
            client.publish(`city/street1/${currentTarget.id}/cmd`, `add:${secs}${currentTarget.slot}`);
            closeModal();
        }

        function formatTime(s) {
            const absS = Math.abs(s);
            const h = Math.floor(absS / 3600).toString().padStart(2, '0');
            const m = Math.floor((absS % 3600) / 60).toString().padStart(2, '0');
            const sec = (absS % 60).toString().padStart(2, '0');
            return (s < 0 ? "-" : "") + h + ":" + m + ":" + sec;
        }

        function updateStatusCell(elId, rem, loc) {
            const el = document.getElementById(elId); if(!el) return;
            let b = "bg-gray", l = "IDLE";
            if (loc) { b = "bg-red"; l = "LOC"; }
            else if (rem < 0) { b = "bg-yellow"; l = "GRACE"; }
            else if (rem > 0) { b = "bg-green"; l = "PAID"; }
            el.innerHTML = `<span class="status-badge ${b}">${l}</span><b>${loc ? 'VIOLATION' : formatTime(rem)}</b>`;
        }
        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
    </script>
</body>
</html>
